<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MediSense AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">✚</div>
            <h2>Create <em>Account</em></h2>
            <p>Join MediSense and start your health journey</p>
        </div>

        <form method="POST" onsubmit="return validateRegister()">

            <!-- Username -->
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Choose a username"
                       required minlength="3">
                <small id="userError" class="form-error"></small>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password"
                           placeholder="Create password"
                           required minlength="6"
                           oninput="checkStrength()">
                    <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                </div>

                <!-- Strength bar -->
                <div class="strength-bar">
                    <div id="strengthFill"></div>
                </div>

                <small id="strengthMsg" class="strength"></small>
                <small id="passError" class="form-error"></small>
            </div>

            <!-- Confirm -->
            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm"
                           placeholder="Re-enter password"
                           required minlength="6">
                    <span class="toggle-password" onclick="togglePassword('confirm')">👁️</span>
                </div>
                <small id="confirmError" class="form-error"></small>
            </div>

            <button type="submit" class="btn-primary auth-btn">
                Create Account →
            </button>

        </form>

        {% if error %}
            <div class="auth-error">{{ error }}</div>
        {% endif %}

        <p class="auth-footer">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login</a>
        </p>

    </div>

</div>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function checkStrength() {
    const pass = document.getElementById("password").value;
    const msg = document.getElementById("strengthMsg");
    const fill = document.getElementById("strengthFill");

    if (pass.length < 6) {
        msg.textContent = "Weak password";
        msg.style.color = "#dc2626";
        fill.style.width = "30%";
        fill.style.background = "#dc2626";
    } else if (pass.match(/[A-Z]/) && pass.match(/[0-9]/)) {
        msg.textContent = "Strong password";
        msg.style.color = "#16a34a";
        fill.style.width = "100%";
        fill.style.background = "#16a34a";
    } else {
        msg.textContent = "Medium strength";
        msg.style.color = "#f59e0b";
        fill.style.width = "65%";
        fill.style.background = "#f59e0b";
    }
}

function validateRegister() {
    let valid = true;

    const user = document.getElementById("username");
    const pass = document.getElementById("password");
    const confirm = document.getElementById("confirm");

    document.getElementById("userError").textContent = "";
    document.getElementById("passError").textContent = "";
    document.getElementById("confirmError").textContent = "";

    if (user.value.length < 3) {
        document.getElementById("userError").textContent =
            "Username must be at least 3 characters";
        valid = false;
    }

    if (pass.value.length < 6) {
        document.getElementById("passError").textContent =
            "Password must be at least 6 characters";
        valid = false;
    }

    if (pass.value !== confirm.value) {
        document.getElementById("confirmError").textContent =
            "Passwords do not match";
        valid = false;
    }

    return valid;
}
</script>

</body>
</html>
