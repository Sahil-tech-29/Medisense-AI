<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediSense AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">✚</div>
            <h2>MediSense <em>AI</em></h2>
            <p>Secure access to your health insights</p>
        </div>

        <form method="POST" onsubmit="return validateForm()">

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required minlength="3">
                <small id="userError" class="form-error"></small>
            </div>

            <div class="input-group">
                <label>Password</label>

                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter password" required minlength="6">
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>

                <small id="passError" class="form-error"></small>
            </div>

            <button type="submit" class="btn-primary auth-btn">
                Login →
            </button>

        </form>

        {% if error %}
            <div class="auth-error">{{ error }}</div>
        {% endif %}

        <p class="auth-footer">
            Don’t have an account?
            <a href="{{ url_for('auth.register') }}">Create one</a>
        </p>

    </div>

</div>

<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}

function validateForm() {
    let valid = true;

    const user = document.getElementById("username");
    const pass = document.getElementById("password");

    document.getElementById("userError").innerText = "";
    document.getElementById("passError").innerText = "";

    if (user.value.length < 3) {
        document.getElementById("userError").innerText =
            "Username must be at least 3 characters";
        valid = false;
    }

    if (pass.value.length < 6) {
        document.getElementById("passError").innerText =
            "Password must be at least 6 characters";
        valid = false;
    }

    return valid;
}
</script>

</body>
</html>
